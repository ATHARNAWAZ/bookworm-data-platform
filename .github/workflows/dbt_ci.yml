name: BookWorm dbt CI Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'dbt/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'dbt/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dbt_validate:
    name: Validate dbt Models
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-databricks
        run: pip install dbt-databricks==1.10.19

      - name: Create dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          bookworm_databricks:
            target: dev
            outputs:
              dev:
                type: databricks
                host: ${{ secrets.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
                token: ${{ secrets.DATABRICKS_TOKEN }}
                catalog: piagroup_assessment_bookworm
                schema: bookworm
                threads: 4
          EOF

      - name: dbt compile
        working-directory: dbt
        run: dbt compile