name: BookWorm dbt CI Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'dbt/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'dbt/**'

jobs:
  dbt_test:
    name: Run dbt Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-databricks
        run: pip install dbt-databricks==1.10.19

      - name: Create dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          bookworm_databricks:
            target: dev
            outputs:
              dev:
                type: databricks
                host: ${{ secrets.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
                token: ${{ secrets.DATABRICKS_TOKEN }}
                catalog: piagroup_assessment_bookworm
                schema: bookworm
                threads: 4
          EOF

      - name: dbt compile
        working-directory: dbt
        run: dbt compile

      - name: dbt run
        working-directory: dbt
        run: dbt run

      - name: dbt test
        working-directory: dbt
        run: dbt test

      - name: dbt docs generate
        working-directory: dbt
        run: dbt docs generate

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: dbt/target/