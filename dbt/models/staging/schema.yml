version: 2

models:
  - name: stg_books
    description: >
      Cleaned and standardised GoodReads book metadata.
      One row per book_id. Foundation for all book analysis.
    config:
      contract:
        enforced: true
    columns:
      - name: book_id
        description: "Unique GoodReads book identifier"
        data_type: string
        tests: [not_null, unique]
      - name: title
        description: "Book title"
        data_type: string
        tests: [not_null]
      - name: average_rating
        description: "Average reader rating (0-5)"
        data_type: double
        tests: [not_null]
      - name: ratings_count
        description: "Total number of ratings"
        data_type: bigint
        tests: [not_null]
      - name: data_quality_flag
        description: "Confidence level based on ratings count"
        data_type: string
        tests:
          - accepted_values:
              values: [high_confidence, medium_confidence, low_confidence]
      - name: primary_author_id
        description: "GoodReads ID of primary author"
        data_type: string
      - name: num_pages
        description: "Number of pages — used for audiobook length scoring"
        data_type: integer
      - name: shelf_genre
        description: "Top reader shelf name — genre fallback"
        data_type: string
      - name: _ingestion_timestamp
        description: "When this record was ingested into Bronze"
        data_type: timestamp
      - name: description
        description: "Book description"
        data_type: string
      - name: format
        description: "Physical format — Hardcover, Paperback etc"
        data_type: string
      - name: isbn
        description: "ISBN-10"
        data_type: string
      - name: isbn13
        description: "ISBN-13"
        data_type: string
      - name: language_code
        description: "Language code"
        data_type: string
      - name: publisher
        description: "Publisher name"
        data_type: string
      - name: text_reviews_count
        description: "Number of text reviews"
        data_type: bigint
      - name: _ingestion_timestamp
        description: "When this record was ingested into Bronze"
        data_type: timestamp
      - name: _silver_timestamp
        description: "When this record was processed into Silver"
        data_type: timestamp
      - name: _silver_timestamp
        description: "When this record was processed into Silver"
        data_type: timestamp

  - name: stg_reviews
    description: >
      Cleaned GoodReads reviews with PII hashed and sentiment classified.
      15.7M records from real reader reviews.
    config:
      contract:
        enforced: true
    columns:
      - name: review_id
        description: "Unique review identifier"
        data_type: string
        tests: [not_null, unique]
      - name: book_id
        description: "Foreign key to stg_books"
        data_type: string
        tests:
          - not_null
          - relationships:
              to: ref('stg_books')
              field: book_id
      - name: user_id_hashed
        description: "SHA256 hash of user_id — GDPR compliant"
        data_type: string
        tests: [not_null]
      - name: rating
        description: "Star rating 1-5"
        data_type: integer
        tests: [not_null]
      - name: sentiment
        description: "Sentiment classification from rating"
        data_type: string
        tests:
          - accepted_values:
              values: [positive, neutral, negative]
      - name: review_date
        description: "Date review was written"
        data_type: date
      - name: review_text
        description: "Raw review text from reader"
        data_type: string
      - name: review_year
        description: "Year review was written"
        data_type: int
      - name: _ingestion_timestamp
        description: "When this record was ingested into Bronze"
        data_type: timestamp
      - name: _silver_timestamp
        description: "When this record was processed into Silver"
        data_type: timestamp

  - name: stg_genres
    description: >
      Primary genre per book derived from GoodReads genre classification.
      Converts wide genre table to one row per book.
    config:
      contract:
        enforced: true
    columns:
      - name: book_id
        description: "Foreign key to stg_books"
        data_type: string
        tests: [not_null, unique]
      - name: primary_genre
        description: "The genre with highest reader count for this book"
        data_type: string
        tests: [not_null]