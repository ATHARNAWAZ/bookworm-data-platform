version: 2

sources:
  - name: bronze
    catalog: piagroup_assessment_bookworm
    schema: bookworm
    description: "Real GoodReads data — 2.3M books, 829K authors"
    tables:
      - name: bronze_books
        description: "Raw GoodReads book metadata"
        columns:
          - name: book_id
            tests: [not_null]
          - name: title
            tests: [not_null]
      - name: bronze_reviews
        description: "Raw GoodReads reader reviews"
        columns:
          - name: review_id
            tests: [not_null]
          - name: book_id
            tests: [not_null]

models:
  - name: stg_books
    description: "Cleaned book metadata from real GoodReads dataset"
    columns:
      - name: book_id
        description: "Unique GoodReads book identifier"
        tests: [not_null, unique]
      - name: title
        description: "Book title"
        tests: [not_null]
      - name: average_rating
        description: "Average reader rating 0-5"
        tests: [not_null]
      - name: data_quality_flag
        description: "Confidence based on ratings count"
        tests:
          - accepted_values:
              values: [high_confidence, medium_confidence, low_confidence]

  - name: stg_reviews
    description: "Cleaned reviews — PII hashed, sentiment classified"
    columns:
      - name: review_id
        tests: [not_null, unique]
      - name: book_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_books')
              field: book_id
      - name: sentiment
        tests:
          - accepted_values:
              values: [positive, neutral, negative]
      - name: user_id_hashed
        tests: [not_null]